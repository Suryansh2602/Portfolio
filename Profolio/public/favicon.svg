<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="55%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.22
                0 0 0 0 0.74
                0 0 0 0 1
                0 0 0 1 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="18" fill="url(#bg)" />

  <g filter="url(#blueGlow)">
    <circle cx="32" cy="32" r="22" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-opacity="0.35" />
    <circle cx="32" cy="32" r="22" fill="none" stroke="#7dd3fc" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="18 120">
      <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 32 32"
        to="360 32 32"
        dur="3.2s"
        repeatCount="indefinite"
      />
    </circle>
    <circle cx="32" cy="32" r="26" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.2">
      <animate
        attributeName="stroke-opacity"
        values="0.15;0.45;0.15"
        dur="2.4s"
        repeatCount="indefinite"
      />
    </circle>
  </g>

  <path
    d="M35 12 22 34h10l-3 18 13-22H32z"
    fill="url(#bolt)"
    stroke="#f5f3ff"
    stroke-opacity="0.35"
    stroke-width="1"
    stroke-linejoin="round"
  />
</svg>
